name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release App
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # `.icon`(Icon Composer)格式需要 Xcode 26+ 才能编译成 AppIcon.icns
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          else
            echo "APP_VERSION=${GITHUB_SHA::7}" >> "${GITHUB_ENV}"
          fi

      - name: Build
        run: |
          xcodebuild \
            -project "macOS Window Styler.xcodeproj" \
            -scheme "macOS Window Styler" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Verify app icon was compiled
        run: |
          APP="build/DerivedData/Build/Products/Release/macOS Window Styler.app"
          if [[ ! -f "${APP}/Contents/Resources/AppIcon.icns" ]]; then
            echo "::error::AppIcon.icns is missing — the .icon file was not compiled (check Xcode version)."
            exit 1
          fi
          echo "AppIcon.icns present ✅"

      - name: Package app
        run: |
          mkdir -p build/artifacts
          ditto -c -k --keepParent \
            "build/DerivedData/Build/Products/Release/macOS Window Styler.app" \
            "build/artifacts/macOS-Window-Styler-${APP_VERSION}.zip"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Window-Styler-${{ env.APP_VERSION }}
          path: build/artifacts/macOS-Window-Styler-${{ env.APP_VERSION }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/macOS-Window-Styler-${{ env.APP_VERSION }}.zip
