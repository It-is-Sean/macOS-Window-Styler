name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apple_silicon:
    name: Build Release App - macOS 26 - Apple Silicon
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          else
            echo "APP_VERSION=${GITHUB_SHA::7}" >> "${GITHUB_ENV}"
          fi

      - name: Build
        run: |
          xcodebuild \
            -project "macOS Window Styler.xcodeproj" \
            -scheme "macOS Window Styler" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Ad-hoc sign app
        run: |
          APP="build/DerivedData/Build/Products/Release/macOS Window Styler.app"
          codesign --force --deep --sign - "${APP}"
          codesign --verify --deep --strict --verbose=2 "${APP}"

      - name: Package app
        run: |
          mkdir -p build/artifacts
          ditto -c -k --keepParent \
            "build/DerivedData/Build/Products/Release/macOS Window Styler.app" \
            "build/artifacts/macOS-Window-Styler-${APP_VERSION}-AppleSilicon.zip"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Window-Styler-${{ env.APP_VERSION }}-AppleSilicon
          path: build/artifacts/macOS-Window-Styler-${{ env.APP_VERSION }}-AppleSilicon.zip

  build_intel:
    name: Build Release App - macOS 26 - Intel Mac
    runs-on: macos-26-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          else
            echo "APP_VERSION=${GITHUB_SHA::7}" >> "${GITHUB_ENV}"
          fi

      - name: Build
        run: |
          xcodebuild \
            -project "macOS Window Styler.xcodeproj" \
            -scheme "macOS Window Styler" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Ad-hoc sign app
        run: |
          APP="build/DerivedData/Build/Products/Release/macOS Window Styler.app"
          codesign --force --deep --sign - "${APP}"
          codesign --verify --deep --strict --verbose=2 "${APP}"

      - name: Package app
        run: |
          mkdir -p build/artifacts
          ditto -c -k --keepParent \
            "build/DerivedData/Build/Products/Release/macOS Window Styler.app" \
            "build/artifacts/macOS-Window-Styler-${APP_VERSION}-Intel.zip"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Window-Styler-${{ env.APP_VERSION }}-Intel
          path: build/artifacts/macOS-Window-Styler-${{ env.APP_VERSION }}-Intel.zip

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build_apple_silicon
      - build_intel
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/**/*.zip
